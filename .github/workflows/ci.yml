name: CI

on:
  pull_request:
  push:
    branches: [main]
    tags: ['v*']
  schedule:
    # Monthly rebuild: the digest-pinned base image freezes security patches;
    # this picks up `apk upgrade` fixes even without a Dependabot bump.
    - cron: '17 4 3 * *'
  workflow_dispatch:

# Zero default permissions — each job grants exactly what it needs.
permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  IMAGE: ghcr.io/ewen-design/moovy
  # Scheduled runs must bypass the layer cache, otherwise the cached
  # `apk upgrade` layer defeats the whole point of the monthly rebuild.
  NO_CACHE: ${{ github.event_name == 'schedule' }}

jobs:
  quality:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: npm

      # --ignore-scripts blocks postinstall supply-chain payloads; the only
      # script we actually need (svelte-kit sync) is run explicitly after.
      - run: npm ci --ignore-scripts --no-audit --no-fund
      - run: npx svelte-kit sync

      - name: Lint (prettier + eslint)
        run: npm run lint

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

      # 70 pre-existing type errors (recherche/recommandations pages).
      # Drop continue-on-error once they are fixed to make this a gate.
      - name: Type check (svelte-check)
        run: npm run check
        continue-on-error: true

  image:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha
            type=semver,pattern={{version}}
            type=schedule,pattern={{date 'YYYYMMDD'}}

      # Build once into the local docker store for smoke test + scan.
      # The GHA layer cache makes the later push step nearly free.
      - name: Build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64
          load: true
          tags: ${{ env.IMAGE }}:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
          no-cache: ${{ env.NO_CACHE == 'true' }}
          pull: true

      - name: Smoke test
        run: |
          docker run -d --name moovy \
            -p 8080:8080 \
            -e ORIGIN=http://localhost:8080 \
            -e TVDB_API_KEY=ci-dummy \
            ${{ env.IMAGE }}:ci

          echo "Waiting for healthcheck..."
          for _ in $(seq 1 30); do
            status=$(docker inspect --format '{{.State.Health.Status}}' moovy)
            [ "$status" = "healthy" ] && break
            [ "$status" = "unhealthy" ] && { echo "container unhealthy"; exit 1; }
            sleep 2
          done
          [ "$(docker inspect --format '{{.State.Health.Status}}' moovy)" = "healthy" ]

          curl -fsS  http://127.0.0.1:8080/healthz
          curl -fsSI http://127.0.0.1:8080/ | grep -i "content-security-policy"
          curl -fsS -o /dev/null -w "page: %{http_code}\n" http://127.0.0.1:8080/

      - name: Container logs on failure
        if: failure()
        run: docker logs moovy 2>&1 || true

      - name: Scan image (trivy)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.IMAGE }}:ci
          severity: CRITICAL,HIGH
          exit-code: '1'
          ignore-unfixed: true

      - name: Push
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          no-cache: ${{ env.NO_CACHE == 'true' }}
          provenance: mode=max
          sbom: true
