version: 2
updates:
  # Bumps the digest-pinned NODE_IMAGE in docker/Dockerfile — the CI build
  # (smoke test + trivy) is the gate before merging.
  - package-ecosystem: docker
    directory: /docker
    schedule:
      interval: weekly

  # Keeps the SHA-pinned actions in ci.yml current.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      dev-dependencies:
        dependency-type: development
        update-types: [minor, patch]
