worker_processes auto;
pid /tmp/nginx.pid;
error_log /dev/stderr warn;

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Writable paths for read-only rootfs
    client_body_temp_path /tmp/client_body;
    proxy_temp_path       /tmp/proxy;
    fastcgi_temp_path     /tmp/fastcgi;
    uwsgi_temp_path       /tmp/uwsgi;
    scgi_temp_path        /tmp/scgi;

    # Performance
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    types_hash_max_size 4096;
    server_tokens      off;

    # Limits (mitigate slowloris / large body abuse)
    client_max_body_size      1m;
    client_body_buffer_size   16k;
    client_header_buffer_size 1k;
    large_client_header_buffers 4 8k;
    client_body_timeout       10s;
    client_header_timeout     10s;
    send_timeout              10s;
    reset_timedout_connection on;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent"';
    access_log /dev/stdout main buffer=32k flush=5s;

    # Compression
    gzip               on;
    gzip_vary          on;
    gzip_comp_level    6;
    gzip_min_length    256;
    gzip_proxied       any;
    gzip_types
        application/atom+xml
        application/javascript
        application/json
        application/manifest+json
        application/rss+xml
        application/vnd.geo+json
        application/vnd.ms-fontobject
        application/wasm
        application/x-font-ttf
        application/x-web-app-manifest+json
        application/xhtml+xml
        application/xml
        font/opentype
        image/bmp
        image/svg+xml
        image/x-icon
        text/cache-manifest
        text/css
        text/plain
        text/vcard
        text/vnd.rim.location.xloc
        text/vtt
        text/x-component
        text/x-cross-domain-policy;

    # Trust the reverse proxy (Traefik on the docker network) for the client
    # IP — without this, every visitor shares Traefik's IP and the per-IP
    # rate limits below throttle everyone collectively. Only private ranges
    # are trusted, and only the docker network can reach this container.
    set_real_ip_from 10.0.0.0/8;
    set_real_ip_from 172.16.0.0/12;
    set_real_ip_from 192.168.0.0/16;
    real_ip_header   X-Forwarded-For;
    real_ip_recursive on;

    # Preserve the scheme Traefik saw (TLS terminates there); fall back to
    # the local scheme when hit directly.
    map $http_x_forwarded_proto $forwarded_proto {
        default $http_x_forwarded_proto;
        ""      $scheme;
    }

    # Rate limiting — dynamic routes are strict, static assets get a higher
    # budget but are still capped (no unthrottled path to the upstream).
    limit_req_zone  $binary_remote_addr zone=req_limit:10m    rate=30r/s;
    limit_req_zone  $binary_remote_addr zone=static_limit:10m rate=200r/s;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;
    limit_req_status 429;
    limit_conn_status 429;

    # Upstream SvelteKit (adapter-node) — sibling process in the same container
    upstream svelte_app {
        server 127.0.0.1:3000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # Strip headers leaking implementation details from upstream
    proxy_hide_header X-Powered-By;
    proxy_hide_header Server;

    server {
        listen 8080 default_server;
        server_name _;

        include /etc/nginx/snippets/security-headers.conf;

        limit_conn conn_limit 20;

        # Block hidden/.git files
        location ~ /\.(?!well-known) { deny all; access_log off; log_not_found off; return 404; }

        # Health probe (excluded from rate-limit + logs)
        location = /healthz {
            access_log off;
            default_type text/plain;
            return 200 'ok';
        }

        # SvelteKit immutable build assets — long cache
        location ^~ /_app/immutable/ {
            limit_req zone=static_limit burst=200 nodelay;

            proxy_pass http://svelte_app;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;
            proxy_set_header X-Forwarded-Host  $host;
            proxy_set_header Connection        "";

            include /etc/nginx/snippets/security-headers.conf;
            proxy_hide_header Cache-Control;
            add_header Cache-Control "public, max-age=31536000, immutable" always;
        }

        # Static files (favicon, fonts, images) — short cache
        location ~* \.(?:css|js|mjs|map|woff2?|ttf|otf|eot|svg|png|jpe?g|gif|webp|avif|ico|json|webmanifest)$ {
            limit_req zone=static_limit burst=200 nodelay;

            proxy_pass http://svelte_app;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;
            proxy_set_header X-Forwarded-Host  $host;
            proxy_set_header Connection        "";

            include /etc/nginx/snippets/security-headers.conf;
            proxy_hide_header Cache-Control;
            add_header Cache-Control "public, max-age=604800" always;
        }

        # Dynamic pages / API → SvelteKit
        location / {
            limit_req zone=req_limit burst=30 nodelay;

            proxy_pass http://svelte_app;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;
            proxy_set_header X-Forwarded-Host  $host;
            proxy_set_header Connection        "";

            proxy_connect_timeout 5s;
            proxy_send_timeout    30s;
            proxy_read_timeout    30s;

            proxy_buffering   on;
            proxy_buffer_size 8k;
            proxy_buffers     16 8k;
        }

        # Compact error pages — no upstream leaks
        error_page 500 502 503 504 /50x.html;
        location = /50x.html { internal; return 500 "Service unavailable\n"; }
    }
}
