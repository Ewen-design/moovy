# Included in the server block AND in every location that uses add_header:
# nginx drops ALL inherited add_header directives as soon as a location
# defines its own, so these must be re-emitted per location.
add_header X-Content-Type-Options       "nosniff"                         always;
add_header X-Frame-Options              "SAMEORIGIN"                      always;
add_header Referrer-Policy              "strict-origin-when-cross-origin" always;
add_header Permissions-Policy           "geolocation=(), microphone=(), camera=(), payment=(), usb=()" always;
add_header Cross-Origin-Opener-Policy   "same-origin"                     always;
add_header Cross-Origin-Resource-Policy "same-origin"                     always;
# 'unsafe-inline' script/style is required by SvelteKit hydration + Svelte
# transitions; img https: covers TVDB artworks + avatar CDNs.
add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self'; media-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'self'" always;
