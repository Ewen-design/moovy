<!doctype html>
<html lang="fr">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="text-scale" content="scale" />
		<meta name="theme-color" content="#1b1711" />
		<style>
			:root {
				color-scheme: dark;
				background: #0b0d11;
			}

			html {
				background: #0b0d11;
			}

			body {
				margin: 0;
				background: #0b0d11;
				color: #f2f5fb;
			}

			html[data-theme='light'] {
				background: #f5f5f7;
			}

			html[data-theme='light'] body {
				background: #f5f5f7;
				color: #111111;
			}
		</style>
		<script>
			(() => {
				const themeMeta = document.querySelector('meta[name="theme-color"]');
				const savedTheme = localStorage.getItem('moovy-theme');
				const theme = savedTheme === 'light' || savedTheme === 'dark' ? savedTheme : 'dark';

				document.documentElement.dataset.theme = theme;
				document.documentElement.style.background = theme === 'dark' ? '#0b0d11' : '#f5f5f7';

				if (themeMeta) {
					themeMeta.setAttribute('content', theme === 'dark' ? '#0b0d11' : '#f5f5f7');
				}
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
