<!doctype html>
<html lang="fr">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="text-scale" content="scale" />
		<meta name="theme-color" content="#0b0d11" />
		<link
			rel="preload"
			href="/Montserrat/Montserrat-Variable.woff2"
			as="font"
			type="font/woff2"
			crossorigin
		/>
		<style>
			@font-face {
				font-family: 'Montserrat Preloader';
				src: url('/Montserrat/Montserrat-Variable.woff2') format('woff2');
				font-weight: 100 900;
				font-style: normal;
				font-display: block;
			}

			:root {
				color-scheme: dark;
				background: #0b0d11;
			}

			html {
				background: #0b0d11;
			}

			body {
				margin: 0;
				background: #0b0d11;
				color: #f2f5fb;
			}
		</style>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
