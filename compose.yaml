name: moovy

services:
  moovy:
    # Image built and published by CI (.github/workflows/ci.yml).
    # Pin a sha-… tag via MOOVY_TAG for immutable deploys / rollbacks.
    # Local build without CI:
    #   docker build -f docker/Dockerfile -t ghcr.io/ewen-design/moovy:local .
    #   MOOVY_TAG=local docker compose up -d
    image: ghcr.io/ewen-design/moovy:${MOOVY_TAG:-latest}
    container_name: moovy
    restart: unless-stopped
    environment:
      NODE_ENV: production
      HOST: 127.0.0.1
      PORT: '3000'
      # SvelteKit adapter-node CSRF / cookie origin — must match the public URL.
      ORIGIN: ${ORIGIN:-http://localhost:8080}
      TVDB_API_KEY: ${TVDB_API_KEY:?TVDB_API_KEY is required}
      # Prefer a file-based secret in production (invisible to `docker inspect`):
      # comment the line above, uncomment below + the secrets blocks.
      # TVDB_API_KEY_FILE: /run/secrets/tvdb_api_key
    # secrets:
    #   - tvdb_api_key
    # No published port: only Traefik (on the shared pangolin network) can
    # reach the container — nothing is exposed on the host.
    expose:
      - '8080'
    networks:
      - pangolin
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    cap_drop: ['ALL']
    security_opt:
      - no-new-privileges:true
    pids_limit: 256
    mem_limit: 512m
    mem_reservation: 128m
    cpus: 1.0
    stop_grace_period: 30s
    ulimits:
      nofile:
        soft: 4096
        hard: 8192
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:8080/healthz >/dev/null 2>&1 || exit 1']
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 20s

# secrets:
#   tvdb_api_key:
#     file: ./secrets/tvdb_api_key.txt

networks:
  pangolin:
    external: true
